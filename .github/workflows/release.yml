Name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      # Direct path to the project file
      PROJECT_FILE: AutoRegister/AutoRegister.csproj
      # A clean staging area for the final DLL
      STAGING_DIR: ${{ github.workspace }}/out

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore AutoRegister.sln

      - name: Publish AutoRegister
        # 'publish' creates a clean, deployable DLL in the staging directory
        run: >
          dotnet publish ${{ env.PROJECT_FILE }} 
          -c Release 
          --no-restore 
          -o ${{ env.STAGING_DIR }}

      - name: Upload AutoRegister DLL to Release
        uses: softprops/action-gh-release@v2
        with:
          # Points directly to the file in our staging directory
          files: ${{ env.STAGING_DIR }}/AutoRegister.dll
          fail_on_unmatched_files: true
