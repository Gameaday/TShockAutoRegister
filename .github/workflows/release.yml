name: Build and Upload AutoRegister DLL

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore AutoRegister.sln

      - name: Build Release
        run: dotnet build AutoRegister.sln -c Release --no-restore

      - name: Locate built DLL
        shell: pwsh
        run: |
          $dll = Get-ChildItem -Path AutoRegister/bin/Release/net9.0 -Recurse -Filter AutoRegister.dll | Select-Object -First 1 -ExpandProperty FullName
          if (-not $dll) { throw "AutoRegister.dll not found in net9.0 output" }
          "DLL_PATH=$dll" >> $env:GITHUB_ENV

      - name: Upload AutoRegister DLL to release
        uses: softprops/action-gh-release@de2c0eb06ae2a88edb4d51b9f6d03413374b2702 # v2.2.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ${{ env.DLL_PATH }}
