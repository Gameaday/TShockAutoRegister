name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      PROJECT_FILE: AutoRegister/AutoRegister.csproj
      STAGING_DIR: ${{ github.workspace }}/out

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore AutoRegister.sln

      - name: Publish AutoRegister
        # -p:CopyLocalLockFileAssemblies=false ensures a clean DLL for TShock
        run: >
          dotnet publish ${{ env.PROJECT_FILE }} 
          -c Release 
          --no-restore 
          -o ${{ env.STAGING_DIR }}
          -p:CopyLocalLockFileAssemblies=false

      - name: Upload AutoRegister DLL to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.STAGING_DIR }}/AutoRegister.dll
          fail_on_unmatched_files: true
