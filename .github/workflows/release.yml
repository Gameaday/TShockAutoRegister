name: Build and Upload AutoRegister DLL

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore AutoRegister.sln

      - name: Build Release
        run: dotnet build AutoRegister.sln -c Release --no-restore

      - name: Locate built DLL
        shell: pwsh
        run: |
          $dll = Get-ChildItem -Path AutoRegister/bin/Release -Recurse -Filter AutoRegister.dll | Select-Object -First 1 -ExpandProperty FullName
          if (-not $dll) { throw "AutoRegister.dll not found" }
          "DLL_PATH=$dll" >> $env:GITHUB_ENV

      - name: Upload AutoRegister DLL to release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ${{ env.DLL_PATH }}
          name: AutoRegister-${{ github.event.release.tag_name }}.dll
          tag_name: ${{ github.event.release.tag_name }}
