name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      PROJECT_DIR: AutoRegister
      PROJECT_FILE: AutoRegister/AutoRegister.csproj
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Configure output directory
        shell: pwsh
        run: |
          $output = "$env:RUNNER_TEMP/output"
          "OUTPUT_DIR=$output" >> $env:GITHUB_ENV

      - name: Restore
        run: dotnet restore AutoRegister.sln

      - name: Build Release
        run: dotnet build ${{ env.PROJECT_FILE }} -c Release --no-restore -p:OutDir="${{ env.OUTPUT_DIR }}/"

      - name: Locate built DLL
        shell: pwsh
        run: |
          $path = "${{ env.OUTPUT_DIR }}"
          $dlls = Get-ChildItem -Path $path -Filter AutoRegister.dll -File
          if (-not $dlls -or $dlls.Count -eq 0) { throw "AutoRegister.dll not found in $path" }
          if ($dlls.Count -gt 1) { throw "Multiple AutoRegister.dll files found in $path" }
          "DLL_PATH=$($dlls[0].FullName)" >> $env:GITHUB_ENV

      - name: Upload AutoRegister DLL to release
        uses: softprops/action-gh-release@de2c0eb06ae2a88edb4d51b9f6d03413374b2702 # v2.2.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ${{ env.DLL_PATH }}
