name: Development Prerelease

on:
  push:
    branches: [main]
    # Only run if actual code or project files changed
    paths:
      - 'AutoRegister/**'
      - 'AutoRegister.sln'
      - '.github/workflows/development.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      PROJECT_FILE: AutoRegister/AutoRegister.csproj
      STAGING_DIR: ${{ github.workspace }}/out
      DEV_TAG: development
      DEV_RELEASE_NAME: "Development Build"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore AutoRegister.sln

      - name: Publish AutoRegister
        # We use 'publish' to ensure a clean, deployable DLL output
        run: >
          dotnet publish ${{ env.PROJECT_FILE }} 
          -c Release 
          --no-restore 
          -o ${{ env.STAGING_DIR }}
          -p:CopyLocalLockFileAssemblies=false

      - name: Update Development Release
        # This step only runs on 'push' to main, not on PRs
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.DEV_TAG;
            const { owner, repo } = context.repo;
            
            try {
              const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.deleteRelease({ owner, repo, release_id: release.data.id });
              core.info(`Deleted old release.`);
            } catch (e) { core.info("No existing release to delete."); }
            
            try {
              await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` });
              core.info(`Deleted old tag.`);
            } catch (e) { core.info("No existing tag to delete."); }

      - name: Upload New DLL
        # This step also only runs on 'push' to main
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.DEV_TAG }}
          name: ${{ env.DEV_RELEASE_NAME }}
          prerelease: true
          files: ${{ env.STAGING_DIR }}/AutoRegister.dll
          fail_on_unmatched_files: true
          target_commitish: ${{ github.sha }}
