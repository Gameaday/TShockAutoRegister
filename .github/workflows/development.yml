Name: Development Prerelease

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      PROJECT_PATH: AutoRegister/AutoRegister.csproj
      # This is where the clean DLL will go
      STAGING_DIR: ${{ github.workspace }}/publish 
      DEV_TAG: development
      DEV_RELEASE_NAME: "Development Build"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore AutoRegister.sln

      - name: Publish Plugin
        # 'publish' is cleaner than 'build' for CI. 
        # -p:CopyLocalLockFileAssemblies=false ensures you don't bundle TShock/Terraria DLLs.
        run: >
          dotnet publish ${{ env.PROJECT_PATH }} 
          -c Release 
          --no-restore 
          -o ${{ env.STAGING_DIR }}

      - name: Remove Existing Release and Tag
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.DEV_TAG;
            const { owner, repo } = context.repo;
            try {
              const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.deleteRelease({ owner, repo, release_id: release.data.id });
              core.info(`Deleted release ${release.data.id}`);
            } catch (e) { core.info("No release to delete."); }
            
            try {
              await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` });
              core.info(`Deleted tag ${tag}`);
            } catch (e) { core.info("No tag to delete."); }

      - name: Publish Prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.DEV_TAG }}
          name: ${{ env.DEV_RELEASE_NAME }}
          prerelease: true
          # Points directly to the DLL in the publish folder
          files: ${{ env.STAGING_DIR }}/AutoRegister.dll
          fail_on_unmatched_files: true
          target_commitish: ${{ github.sha }}
