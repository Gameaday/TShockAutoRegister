Name: Development Prerelease

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      PROJECT_FILE: AutoRegister/AutoRegister.csproj
      STAGING_DIR: ${{ github.workspace }}/out
      DEV_TAG: development
      DEV_RELEASE_NAME: "Development Build"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore AutoRegister.sln

      - name: Publish AutoRegister
        # -p:CopyLocalLockFileAssemblies=false is the "secret sauce" 
        # that keeps TShock/Terraria DLLs out of your artifact.
        run: >
          dotnet publish ${{ env.PROJECT_FILE }} 
          -c Release 
          --no-restore 
          -o ${{ env.STAGING_DIR }}
          -p:CopyLocalLockFileAssemblies=false

      - name: Update Development Release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.DEV_TAG;
            const { owner, repo } = context.repo;
            
            // 1. Delete the old release
            try {
              const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.deleteRelease({ owner, repo, release_id: release.data.id });
              core.info(`Deleted old release.`);
            } catch (e) { core.info("No existing release found to delete."); }
            
            // 2. Delete the old tag (crucial for pointing to the NEW commit)
            try {
              await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` });
              core.info(`Deleted old tag.`);
            } catch (e) { core.info("No existing tag found to delete."); }

      - name: Upload New DLL
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.DEV_TAG }}
          name: ${{ env.DEV_RELEASE_NAME }}
          prerelease: true
          files: ${{ env.STAGING_DIR }}/AutoRegister.dll
          fail_on_unmatched_files: true
          # Forces the tag to follow the current commit SHA
          target_commitish: ${{ github.sha }} 
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.DEV_TAG;
            const { owner, repo } = context.repo;
            
            // 1. Delete the old release
            try {
              const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.deleteRelease({ owner, repo, release_id: release.data.id });
              core.info(`Deleted old release.`);
            } catch (e) { core.info("No existing release found to delete."); }
            
            // 2. Delete the old tag (crucial for pointing to the NEW commit)
            try {
              await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` });
              core.info(`Deleted old tag.`);
            } catch (e) { core.info("No existing tag found to delete."); }

      - name: Upload New DLL
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.DEV_TAG }}
          name: ${{ env.DEV_RELEASE_NAME }}
          prerelease: true
          files: ${{ env.STAGING_DIR }}/AutoRegister.dll
          fail_on_unmatched_files: true
          # Forces the tag to follow the current commit SHA
          target_commitish: ${{ github.sha }} 
